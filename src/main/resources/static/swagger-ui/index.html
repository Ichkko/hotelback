<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotelback API Docs</title>
    <link rel="stylesheet" href="/webjars/swagger-ui/5.17.14/swagger-ui.css">
    <style>
        html {
            box-sizing: border-box;
            overflow-y: scroll;
        }

        *,
        *::before,
        *::after {
            box-sizing: inherit;
        }

        body {
            margin: 0;
            background: #f7f9fc;
        }
    </style>
</head>
<body>
<div id="swagger-ui"></div>
<script src="/webjars/swagger-ui/5.17.14/swagger-ui-bundle.js"></script>
<script src="/webjars/swagger-ui/5.17.14/swagger-ui-standalone-preset.js"></script>
<script>
    window.onload = function () {
        window.ui = SwaggerUIBundle({
            url: "/api-docs",
            dom_id: "#swagger-ui",
            deepLinking: true,
            presets: [
                SwaggerUIBundle.presets.apis,
                SwaggerUIStandalonePreset
            ],
            layout: "StandaloneLayout"
        });
    };
</script>
</body>
</html>

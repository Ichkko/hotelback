spring.application.name=hotelback

spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hotel_system}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
# JPA properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.format_sql=true
#Disable default loggers

# Logging
logging.level.org=WARN
#Show The Executed SQL With Parameter Bindings
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor=TRACE
logging.level.org.hibernate=DEBUG
server.port=${SERVER_PORT:8082}

# JWT configuration
jwt.secret=${JWT_TOKEN:${JWT_token:dev-only-change-me-please-32chars}}
jwt.expiration=86400000
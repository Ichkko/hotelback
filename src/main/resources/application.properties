spring.application.name=hotelback
spring.profiles.default=dev

spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.port=${SERVER_PORT:8082}

jwt.expiration=${JWT_EXPIRATION:86400000}

jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.login-max-attempts=${JWT_LOGIN_MAX_ATTEMPTS:5}
jwt.login-attempt-window-seconds=${JWT_LOGIN_ATTEMPT_WINDOW_SECONDS:300}
jwt.login-block-duration-seconds=${JWT_LOGIN_BLOCK_DURATION_SECONDS:600}
# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.version=5.17.14
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
google.oauth2.client-id=592677227851-erq4rg6d4dqe3pvi9gcr07n3h8a93q30.apps.googleusercontent.com

qpay.base-url=${QPAY_BASE_URL:https://merchant-sandbox.qpay.mn}
qpay.username=${QPAY_USERNAME:TEST_MERCHANT}
qpay.password=${QPAY_PASSWORD:123456}
qpay.invoice-code=${QPAY_INVOICE_CODE:TEST_INVOICE}
qpay.callback-url=${QPAY_CALLBACK_URL:http://localhost:8082/api/payments/qpay/callback}
qpay.sender-branch-code=${QPAY_SENDER_BRANCH_CODE:ONLINE}
qpay.sender-staff-code=${QPAY_SENDER_STAFF_CODE:online}

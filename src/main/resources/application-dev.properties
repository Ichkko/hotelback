spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hotel_system}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

app.flyway.repair-on-validation-error=true
# In dev, failed Flyway validation caused by a previously failed migration
# can be repaired and retried once by DevFlywayRecoveryConfig.

# In dev, failed Flyway validation from an interrupted local migration
# is automatically repaired and retried by DevFlywayRecoveryConfig.

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor=TRACE
logging.level.org.hibernate=DEBUG

jwt.secret=${JWT_TOKEN:${JWT_token:dev-only-change-me-please-32chars}}

jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.login-max-attempts=${JWT_LOGIN_MAX_ATTEMPTS:5}
jwt.login-attempt-window-seconds=${JWT_LOGIN_ATTEMPT_WINDOW_SECONDS:300}
jwt.login-block-duration-seconds=${JWT_LOGIN_BLOCK_DURATION_SECONDS:600}

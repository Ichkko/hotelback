spring.datasource.url=jdbc:h2:mem:hotelback;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

jwt.secret=test-secret-key-test-secret-key-1234
jwt.expiration=86400000

jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.login-max-attempts=${JWT_LOGIN_MAX_ATTEMPTS:5}
jwt.login-attempt-window-seconds=${JWT_LOGIN_ATTEMPT_WINDOW_SECONDS:300}
jwt.login-block-duration-seconds=${JWT_LOGIN_BLOCK_DURATION_SECONDS:600}
google.oauth2.client-id=${GOOGLE_OAUTH2_CLIENT_ID:test-google-client-id}

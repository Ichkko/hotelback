openapi: 3.0.3
info:
  title: Hotelback Frontend Contract
  version: 1.0.0
  description: |
    Frontend integration contract derived from the current backend controllers and DTOs.
servers:
  - url: http://localhost:8080
    description: Local development
security:
  - bearerAuth: []
paths:
  /api/auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /api/auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /api/auth/refresh:
    post:
      tags: [Auth]
      security: []
      summary: Refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New auth tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /api/auth/logout:
    post:
      tags: [Auth]
      security: []
      summary: Logout and blacklist tokens
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logged out
  /api/bookings:
    get:
      tags: [Bookings]
      summary: Get bookings for current user or all for admin
      responses:
        '200':
          description: Booking list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookingResponse'
    post:
      tags: [Bookings]
      summary: Create booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
      responses:
        '200':
          description: Created booking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
  /api/bookings/user/{userId}:
    get:
      tags: [Bookings]
      summary: Get bookings by user
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Booking list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookingResponse'
  /api/bookings/{id}:
    get:
      tags: [Bookings]
      summary: Get booking detail
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Booking detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
    put:
      tags: [Bookings]
      summary: Update booking
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBookingRequest'
      responses:
        '200':
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
    delete:
      tags: [Bookings]
      summary: Delete booking
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Delete message
          content:
            text/plain:
              schema:
                type: string
  /api/bookings/{id}/confirm:
    post:
      tags: [Bookings]
      summary: Confirm booking
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Confirmed booking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
  /api/bookings/{id}/cancel:
    post:
      tags: [Bookings]
      summary: Cancel booking
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Cancelled booking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
  /api/wishlist:
    post:
      tags: [Wishlist]
      summary: Add to wishlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WishlistRequest'
      responses:
        '201':
          description: Created wishlist item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistResponse'
  /api/wishlist/user/{userId}:
    get:
      tags: [Wishlist]
      summary: Get wishlist by user
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Wishlist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WishlistResponse'
  /api/wishlist/user/{userId}/room/{roomId}/exists:
    get:
      tags: [Wishlist]
      summary: Check room in wishlist
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: Exists flag
          content:
            application/json:
              schema:
                type: object
                properties:
                  exists:
                    type: boolean
                required: [exists]
  /api/wishlist/{id}:
    delete:
      tags: [Wishlist]
      summary: Delete wishlist item by id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted
  /api/wishlist/user/{userId}/room/{roomId}:
    delete:
      tags: [Wishlist]
      summary: Delete wishlist item by user and room
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/RoomId'
      responses:
        '204':
          description: Deleted
  /api/notifications:
    post:
      tags: [Notifications]
      summary: Create notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationRequest'
      responses:
        '201':
          description: Created notification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
  /api/notifications/user/{userId}:
    get:
      tags: [Notifications]
      summary: List notifications by user
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Notification list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationResponse'
  /api/notifications/user/{userId}/unread-count:
    get:
      tags: [Notifications]
      summary: Get unread count
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  unreadCount:
                    type: integer
                    format: int64
                required: [unreadCount]
  /api/notifications/{id}/read:
    post:
      tags: [Notifications]
      summary: Mark notification as read
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
  /api/notifications/user/{userId}/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Updated count
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                required: [updated]
  /api/notifications/{id}:
    delete:
      tags: [Notifications]
      summary: Delete notification
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted
  /api/payments:
    get:
      tags: [Payments]
      summary: List payments
      responses:
        '200':
          description: Payment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentResponse'
    post:
      tags: [Payments]
      summary: Create payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '200':
          description: Created payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
  /api/payments/{id}:
    get:
      tags: [Payments]
      summary: Get payment detail
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Payment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
    put:
      tags: [Payments]
      summary: Update payment
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '200':
          description: Updated payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
    delete:
      tags: [Payments]
      summary: Delete payment
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Delete message
          content:
            text/plain:
              schema:
                type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    RoomId:
      name: roomId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        phone:
          type: string
        role:
          type: string
          nullable: true
          description: Ignored by backend during registration
        userRole:
          type: string
          nullable: true
          description: Ignored by backend during registration
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          nullable: true
    AuthResponse:
      type: object
      required: [token, refreshToken, userId, email, name, role]
      properties:
        token:
          type: string
        refreshToken:
          type: string
        userId:
          type: integer
          format: int64
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          example: USER
    CreateBookingRequest:
      type: object
      required: [roomId, checkinDate, checkoutDate, firstName, lastName, email, phone, guestCount]
      properties:
        userId:
          type: integer
          format: int64
          nullable: true
        roomId:
          type: integer
          format: int64
        checkinDate:
          type: string
          format: date
        checkoutDate:
          type: string
          format: date
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        guestCount:
          type: integer
          minimum: 1
        specialRequests:
          type: string
          nullable: true
        roomPrice:
          type: number
          format: double
          nullable: true
        status:
          type: string
          enum: [PENDING, CONFIRMED, CANCELLED]
          nullable: true
    UpdateBookingRequest:
      type: object
      required: [checkinDate, checkoutDate, firstName, lastName, email, phone, guestCount]
      properties:
        checkinDate:
          type: string
          format: date
        checkoutDate:
          type: string
          format: date
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        guestCount:
          type: integer
          minimum: 1
        specialRequests:
          type: string
          nullable: true
        roomPrice:
          type: number
          format: double
          nullable: true
        status:
          type: string
          enum: [PENDING, CONFIRMED, CANCELLED]
          nullable: true
    UserSummaryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
    RoomResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        hotelId:
          type: integer
          format: int64
        roomType:
          type: string
        price:
          type: number
          format: double
        capacity:
          type: integer
        status:
          type: string
    BookingResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user:
          $ref: '#/components/schemas/UserSummaryResponse'
        room:
          $ref: '#/components/schemas/RoomResponse'
        checkinDate:
          type: string
          format: date
        checkoutDate:
          type: string
          format: date
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        guestCount:
          type: integer
        specialRequests:
          type: string
          nullable: true
        nights:
          type: integer
        roomPrice:
          type: number
        serviceFee:
          type: number
        totalPrice:
          type: number
        bookingNumber:
          type: string
        status:
          type: string
          enum: [PENDING, CONFIRMED, CANCELLED]
    WishlistRequest:
      type: object
      required: [userId, roomId]
      properties:
        userId:
          type: integer
          format: int64
        roomId:
          type: integer
          format: int64
    WishlistResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        userName:
          type: string
        roomId:
          type: integer
          format: int64
        roomType:
          type: string
        roomPrice:
          type: number
          format: double
        roomCapacity:
          type: integer
        createdAt:
          type: string
          format: date-time
    NotificationRequest:
      type: object
      required: [userId, title, message]
      properties:
        userId:
          type: integer
          format: int64
        title:
          type: string
        message:
          type: string
        type:
          type: string
          nullable: true
    NotificationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        title:
          type: string
        message:
          type: string
        type:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
    CreatePaymentRequest:
      type: object
      required: [bookingId, amount, paymentMethod]
      properties:
        bookingId:
          type: integer
          format: int64
        amount:
          type: number
        paymentMethod:
          type: string
    PaymentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        bookingId:
          type: integer
          format: int64
        amount:
          type: number
        paymentMethod:
          type: string
        status:
          type: string
        paymentDate:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        code:
          type: string
        message:
          type: string
        path:
          type: string
        traceId:
          type: string
        validationErrors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
    ValidationError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
        rejectedValue:
          nullable: true

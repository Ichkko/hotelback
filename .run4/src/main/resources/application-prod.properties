spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

logging.level.org=WARN
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor=OFF

jwt.secret=${JWT_TOKEN}

jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.login-max-attempts=${JWT_LOGIN_MAX_ATTEMPTS:5}
jwt.login-attempt-window-seconds=${JWT_LOGIN_ATTEMPT_WINDOW_SECONDS:300}
jwt.login-block-duration-seconds=${JWT_LOGIN_BLOCK_DURATION_SECONDS:600}
